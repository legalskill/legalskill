    required: false
    role: "一站式综合库，法条与案例一站式满足"
  - name: "国家法律知识库"
    required: false
    role: "全量法规库，需核实现行有效性"
  - name: "律锥·法律官方信源知识库"
    required: false
    role: "官方案例库，案例补充查询首选"
  - name: "律锥·法律案例知识库"
    required: false
    role: "海量案例库，案例穷尽式查询"

compatibility:
  - ima.copilot
  - Claude.ai
  - Claude Code
  - API
